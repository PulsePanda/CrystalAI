<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    font-size: 13px;
    line-height: 1.6;
    color: #111;
    max-width: 780px;
    margin: 40px auto;
    padding: 0 40px;
  }
  .header {
    border-bottom: 2px solid #111;
    padding-bottom: 12px;
    margin-bottom: 28px;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.05em;
    margin: 0 0 4px 0;
    text-transform: uppercase;
  }
  .header .meta {
    font-size: 11px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .section {
    margin-bottom: 28px;
  }
  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #444;
    border-bottom: 1px solid #ddd;
    padding-bottom: 4px;
    margin-bottom: 14px;
  }
  .item {
    margin-bottom: 10px;
    padding-left: 14px;
    border-left: 2px solid #ddd;
  }
  .item-title {
    font-weight: 600;
    font-size: 13px;
  }
  .item-detail {
    color: #444;
    font-size: 12px;
    margin-top: 2px;
  }
  .school-tag {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: #888;
    text-transform: uppercase;
    margin-left: 6px;
  }
  .footer {
    margin-top: 40px;
    padding-top: 12px;
    border-top: 1px solid #eee;
    font-size: 10px;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>
  <div class="header">
    <h1>Status Brief — Austin VanAlstyne</h1>
    <div class="meta">GIS + SJA &nbsp;·&nbsp; {{DATE_RANGE}} &nbsp;·&nbsp; Prepared {{TODAY}}</div>
  </div>

  <!-- COMPLETED -->
  <div class="section">
    <div class="section-title">Completed</div>
    {{COMPLETED_ITEMS}}
  </div>

  <!-- WINS -->
  <div class="section">
    <div class="section-title">Wins</div>
    {{WINS_ITEMS}}
  </div>

  <!-- IN FLIGHT -->
  <div class="section">
    <div class="section-title">In Flight</div>
    {{IN_FLIGHT_ITEMS}}
  </div>

  <!-- WATCH LIST -->
  <div class="section">
    <div class="section-title">Watch List</div>
    {{WATCH_LIST_ITEMS}}
  </div>

  <div class="footer">Umbrella Systems LLC &nbsp;·&nbsp; Confidential</div>
</body>
</html>
